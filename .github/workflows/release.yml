name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
          token: ${{ github.token }}

      - name: Configure git identity
        run: |
          git config user.name  "semantic-release-bot"
          git config user.email "semantic-release-bot@users.noreply.github.com"

      - name: Run semantic release
        uses: jedi-knights/go-semantic-release@v0.9.0
        with:
          github_token: ${{ github.token }}

      - name: Update pyproject.toml version
        run: |
          if [ -f VERSION ]; then
            NEW_VERSION=$(cat VERSION)
            sed -i "s/^version = \".*\"/version = \"${NEW_VERSION}\"/" pyproject.toml
          fi

      - name: Commit generated files
        run: |
          git add CHANGELOG.md VERSION pyproject.toml
          git diff --cached --quiet || git commit -m "chore(release): update version files [skip ci]"
          git push
